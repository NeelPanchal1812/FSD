<style>
.rainbow {
    width: 350px;
    height: 150px;
    color: white;
    font-size: 30px;
    text-align: center;
    padding-top: 50px;
    background-image: linear-gradient(
        to right,
        red, orange, yellow, green, blue, indigo, violet
    );
    transition: transform 10s;
}
.rainbow:hover{transform:rotate(360deg);;}
</style>

<div class="rainbow">Rainbow</div>
