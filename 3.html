<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.c
ss" rel="stylesheet">
<title>Bootstrap Sections</title>
</head>
<body class="container py-5">
<div class="row">
<div class="col-md-6 mb-4">
            <h2>First Section</h2>
            <p>This is a paragraph in the first section.</p>
            <pre class="bg-light p-3">
                This is preformatted text.
                It preserves spaces and line breaks.
            </pre>
        </div>
        <div class="col-md-6 mb-4">
            <h3>Second Section: Table</h3>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr><th>A</th><th>B</th><th>C</th><th>D</th></tr>
                    </thead>
                    <tbody>
                        
<tr><td>100</td><td>200</td><td>300</td><td>400</td></tr>
                        
<tr><td>500</td><td>600</td><td>700</td><td>800</td></tr>
                        
<tr><td>900</td><td>1000</td><td>1100</td><td>1200</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
