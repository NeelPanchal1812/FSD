<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopZone - Homepage</title>
    <!-- Instruction: Including Bootstrap CSS for responsive design and styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Instruction: Resetting default margins and padding for consistent layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Instruction: Setting body font and background color */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #f5f5f5;
        }

        /* Instruction: Styling the navigation bar */
        nav {
            background: white;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 30px;
        }

        /* Instruction: Hamburger menu for mobile navigation */
        .hamburger {
            font-size: 28px;
            cursor: pointer;
            color: #232f3e;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
        }

        .hamburger:hover {
            transform: scale(1.1);
        }

        /* Instruction: Logo styling with gradient */
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #232f3e;
            text-decoration: none;
            white-space: nowrap;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Instruction: Search bar container */
        .search-container {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .search-bar:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 20px;
            font-size: 15px;
            outline: none;
        }

        .search-bar button {
            background: transparent;
            border: none;
            padding: 12px 20px;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-bar button:hover {
            transform: scale(1.1);
        }

        /* Instruction: Navigation icons styling */
        .nav-icons {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-icon {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nav-icon:hover {
            transform: translateY(-2px);
        }

        .icon-symbol {
            font-size: 28px;
            color: #232f3e;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* Instruction: Sidebar menu for categories */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: left 0.3s;
            z-index: 2000;
            overflow-y: auto;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-size: 20px;
        }

        .close-btn {
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
        }

        .sidebar-content {
            padding: 20px;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            padding: 15px 10px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background 0.2s;
            font-size: 16px;
        }

        .category-item:hover {
            background: #f5f5f5;
            padding-left: 15px;
        }

        .category-icon {
            font-size: 24px;
        }

        /* Instruction: Overlay for sidebar */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 1500;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Instruction: Main content area */
        .content {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Instruction: Hero section styling */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.9;
        }

        /* Instruction: Product card styling */
        .product-card img {
            height: 180px;
            object-fit: cover;
        }

        /* Instruction: Responsive design for mobile */
        @media (max-width: 768px) {
            nav {
                padding: 12px 20px;
                gap: 15px;
            }

            .logo {
                font-size: 24px;
            }

            .search-container {
                max-width: none;
            }

            .nav-icons {
                gap: 15px;
            }

            .icon-symbol {
                font-size: 24px;
            }

            .hero h1 {
                font-size: 32px;
            }
        }

        @media (max-width: 480px) {
            nav {
                gap: 10px;
            }

            .logo {
                display: none;
            }

            .search-bar input {
                padding: 10px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Instruction: Navigation Bar - copied from 21.html for consistency -->
    <nav>
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
        <a href="#" class="logo">ShopZone</a>
        <div class="search-container">
            <div class="search-bar">
                <input type="text" placeholder="Search products, brands and more..." id="searchInput">
                <button onclick="searchProducts()">🔍</button>
            </div>
        </div>
        <div class="nav-icons">
            <div class="nav-icon" onclick="alert('Account feature coming soon!')">
                <span class="icon-symbol">👤</span>
            </div>
            <div class="nav-icon" onclick="alert('Wishlist feature coming soon!')">
                <span class="icon-symbol">❤️</span>
            </div>
            <div class="nav-icon" onclick="toggleCart()">
                <span class="icon-symbol">🛒</span>
                <span class="cart-badge" id="cartCount">0</span>
            </div>
        </div>
    </nav>
