    <title>Two Sections</title>
    <style>
        .underlined {
            text-decoration: underline;
        }

<body class="container py-5">
    <div class="row">
        <div class="col-12 mb-5">
            <h2 class="text-end underlined">Section 1 Heading</h2>
            <p class="text-center">This is a centered paragraph under the 
underlined heading.</p>
        </div>
        <div class="col-12">
            <h3>Section 2: Sample Table</h3>
            <table class="table table-bordered">
                <thead class="table-dark">
                    
<tr><th>Col1</th><th>Col2</th><th>Col3</th><th>Col4</th></tr>
                </thead>
                <tbody>
                    
<tr><td>Data1</td><td>Data2</td><td>Data3</td><td>Data4</td></tr>
                    
<tr><td>Data5</td><td>Data6</td><td>Data7</td><td>Data8</td></tr>
                    
<tr><td>Data9</td><td>Data10</td><td>Data11</td><td>Data12</td></tr
>
                </tbody>
            </table>
        </div>
    </div>
</body>
